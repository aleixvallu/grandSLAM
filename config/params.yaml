g_slam:
  ros__parameters:

    gtsam_debug: false
    

    topics:
      input:
        imu: "/ouster/imu"
        # imu: "/os1_cloud_node/imu"
        cones: "/cones"
      output:
        state: "/gslam/state"
        cones: "/gslam/cones"

    lidar2baselink:
      t: [0., 0., 0.98] # (x, y, z) [meters]
      R: [0., 0., 0.]  # roll, pitch, yaw [deg]

    imu2baselink:
      t: [0., 0., 0.98] # (x, y, z) [meters]
      R: [0., 0., 0.]  # roll, pitch, yaw [deg]

    

    # lidar2baselink:
    #       t: [0., 0., 0.0] # (x, y, z) [meters]
    #       R: [0., -5.5, 90.]  # roll, pitch, yaw [deg]

    # imu2baselink:
    #   t: [0., 0., 0.0] # (x, y, z) [meters]
    #   R: [0., -5.5, 90.]  # roll, pitch, yaw [deg]

    bias:
      accel: [0.0001, 0.0001, 0.0001]  # [m/s^2]
      gyro:  [0.0001, 0.0001, 0.0001]  # [rad/s]
      gravity: 0.
      # gravity: 9.8984


    # maxSqDist: 0.062
    # maxSqDist: 0.09
    maxSqDist: 0.25

    
    covariance:
      process: 0.001
      pose: 0.001            # [m] 
      lidar: 0.001          # [m]
      velocity: 0.001         # [m/s] 
      gyro: 6.01e-4          # [rad/s^2]
      accel: 1.53e-2        # [m^2]
      biasGyro: 1.54e-5     # [rad^2/s^2 * sqrt(s)]  # alan noise
      biasAccel: 3.38e-4    # [m/s * sqrt(s)]        # alan noise


    ISAM: 
      skip:       1
      threshold:  0.001

    calibration:
      time: 1.0
      accel: true
      gyro: true